name: Build Standalone Binaries

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP version'
        default: '8.3'
  push:
    tags:
      - 'v*'

jobs:
  prepare-phar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php_version || '8.3' }}
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Install Box
        run: |
          curl -LSs https://github.com/box-project/box/releases/latest/download/box.phar -o box.phar
          chmod +x box.phar

      - name: Build PHAR
        run: php box.phar compile

      - name: Verify PHAR
        run: php scip-php.phar --help

      - name: Upload PHAR
        uses: actions/upload-artifact@v4
        with:
          name: scip-php-phar
          path: scip-php.phar

  build:
    needs: prepare-phar
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            spc_bin: spc-linux-x86_64
            output: scip-php-linux-x86_64
          - os: macos-14
            spc_bin: spc-macos-aarch64
            output: scip-php-darwin-arm64
          - os: macos-13
            spc_bin: spc-macos-x86_64
            output: scip-php-darwin-x86_64
          - os: windows-latest
            spc_bin: spc-windows-x64.exe
            output: scip-php-windows-x86_64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php_version || '8.3' }}

      - name: Download PHAR
        uses: actions/download-artifact@v4
        with:
          name: scip-php-phar

      - name: Download SPC
        shell: bash
        run: |
          curl -fsSL -o ${{ matrix.spc_bin }} https://dl.static-php.dev/static-php-cli/spc-bin/nightly/${{ matrix.spc_bin }}
          if [ "${{ runner.os }}" != "Windows" ]; then chmod +x ${{ matrix.spc_bin }}; fi
          ./${{ matrix.spc_bin }} --version

      - name: Build static PHP with micro SAPI (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ./${{ matrix.spc_bin }} doctor --auto-fix 2>&1 || true
          ./${{ matrix.spc_bin }} craft --debug 2>&1

      - name: Build static PHP with micro SAPI (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          ${{ matrix.spc_bin }} doctor --auto-fix 2>&1 || true
          ${{ matrix.spc_bin }} craft --debug 2>&1

      - name: Combine binary (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ./${{ matrix.spc_bin }} micro:combine scip-php.phar -O ${{ matrix.output }}
          chmod +x ./${{ matrix.output }}
          ./${{ matrix.output }} --help

      - name: Combine binary (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          ${{ matrix.spc_bin }} micro:combine scip-php.phar -O ${{ matrix.output }}
          .\${{ matrix.output }} --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
